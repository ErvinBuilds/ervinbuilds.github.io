<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong — ErvinBuilds</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      user-select: none;
    }

    #app {
      position: relative;
      width: 900px;
      height: 600px;
      transform-origin: center center;
    }

    #gameCanvas {
      display: block;
      width: 900px;
      height: 600px;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.91);
      backdrop-filter: blur(2px);
    }
    .screen.hidden { display: none; }

    .eb-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      color: rgba(255, 180, 0, 0.55);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255, 165, 0, 0.4);
    }

    .main-title {
      font-size: 86px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 16px;
      text-shadow:
        0 0 10px #FFD700,
        0 0 25px #FFA500,
        0 0 55px rgba(255, 165, 0, 0.6),
        0 0 100px rgba(255, 165, 0, 0.3);
      margin-bottom: 6px;
      line-height: 1;
    }

    .tagline {
      font-size: 11px;
      color: rgba(255, 180, 0, 0.4);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    .section-label {
      font-size: 9px;
      color: rgba(255, 180, 0, 0.45);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .diff-row {
      display: flex;
      gap: 12px;
      margin-bottom: 44px;
    }

    .btn-diff {
      padding: 11px 28px;
      border: 1px solid rgba(255, 165, 0, 0.45);
      background: transparent;
      color: rgba(255, 180, 0, 0.6);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s ease;
      outline: none;
    }
    .btn-diff:hover {
      border-color: #FFD700;
      color: #FFD700;
      background: rgba(255, 165, 0, 0.08);
      box-shadow: 0 0 14px rgba(255, 165, 0, 0.45), 0 0 5px rgba(255, 215, 0, 0.3), inset 0 0 8px rgba(255, 165, 0, 0.05);
    }
    .btn-diff.selected {
      border-color: #FFD700;
      background: #FFD700;
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 22px rgba(255, 165, 0, 0.7), 0 0 8px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 165, 0, 0.3);
    }

    .btn-primary {
      padding: 15px 52px;
      border: 2px solid #FFD700;
      background: transparent;
      color: #FFD700;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s ease;
      outline: none;
      box-shadow: 0 0 12px rgba(255, 165, 0, 0.25), inset 0 0 12px rgba(255, 165, 0, 0.04);
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }
    .btn-primary:hover {
      background: #FFD700;
      color: #000;
      box-shadow: 0 0 35px rgba(255, 165, 0, 0.75), 0 0 12px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 165, 0, 0.4);
      text-shadow: none;
    }

    .btn-secondary {
      padding: 13px 28px;
      border: 1px solid rgba(255, 165, 0, 0.45);
      background: transparent;
      color: rgba(255, 180, 0, 0.65);
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.18s ease;
      outline: none;
    }
    .btn-secondary:hover {
      border-color: #FFD700;
      color: #FFD700;
      background: rgba(255, 165, 0, 0.07);
      box-shadow: 0 0 18px rgba(255, 165, 0, 0.4), 0 0 6px rgba(255, 215, 0, 0.35);
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
    }

    .hint {
      font-size: 10px;
      color: rgba(255, 180, 0, 0.28);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 36px;
    }

    .result-title {
      font-size: 60px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 10px;
      text-shadow:
        0 0 12px #FFD700,
        0 0 30px #FFA500,
        0 0 60px rgba(255, 165, 0, 0.5);
      margin-bottom: 10px;
    }
    .result-title.red {
      color: #FF4444;
      text-shadow:
        0 0 12px rgba(255, 68, 68, 0.9),
        0 0 30px rgba(255, 68, 68, 0.6),
        0 0 60px rgba(255, 68, 68, 0.3);
    }

    .result-score {
      font-size: 13px;
      color: rgba(255, 180, 0, 0.55);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 50px;
      text-shadow: 0 0 8px rgba(255, 165, 0, 0.3);
    }

    .action-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    #watermark {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 9px;
      color: rgba(255, 180, 0, 0.22);
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 165, 0, 0.35), 0 0 4px rgba(255, 215, 0, 0.2);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 165, 0, 0.5), transparent);
      box-shadow: 0 0 8px rgba(255, 165, 0, 0.3);
      margin: 0 auto 36px;
    }

    #btn-pause {
      position: absolute;
      top: 14px;
      right: 18px;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 165, 0, 0.35);
      background: rgba(0, 0, 0, 0.55);
      color: rgba(255, 180, 0, 0.5);
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      outline: none;
      border-radius: 4px;
      letter-spacing: 1px;
      font-family: inherit;
    }
    #btn-pause:hover {
      border-color: #FFD700;
      color: #FFD700;
      background: rgba(255, 165, 0, 0.1);
      box-shadow: 0 0 16px rgba(255, 165, 0, 0.5), 0 0 6px rgba(255, 215, 0, 0.4);
    }

    .pause-title {
      font-size: 58px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 10px;
      text-shadow:
        0 0 12px #FFD700,
        0 0 30px #FFA500,
        0 0 60px rgba(255, 165, 0, 0.5);
      margin-bottom: 10px;
    }
    .pause-menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
      width: 220px;
    }
    .pause-menu .btn-primary,
    .pause-menu .btn-secondary {
      width: 100%;
      text-align: center;
    }

    .controls-title {
      font-size: 42px;
      font-weight: 900;
      color: #FFD700;
      letter-spacing: 8px;
      text-shadow:
        0 0 12px #FFD700,
        0 0 28px #FFA500,
        0 0 55px rgba(255, 165, 0, 0.4);
      margin-bottom: 10px;
    }
    .controls-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 0;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .key-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(255, 165, 0, 0.6);
      color: #FFD700;
      font-size: 13px;
      font-family: inherit;
      font-weight: bold;
      letter-spacing: 1px;
      background: rgba(255, 165, 0, 0.06);
      box-shadow: 0 0 12px rgba(255, 165, 0, 0.3), 0 0 5px rgba(255, 215, 0, 0.2), inset 0 0 8px rgba(255, 165, 0, 0.04);
      text-shadow: 0 0 6px rgba(255, 215, 0, 0.5);
    }
    .key-sep {
      color: rgba(255, 165, 0, 0.35);
      font-size: 13px;
      padding: 0 2px;
    }
    .key-action {
      font-size: 11px;
      color: rgba(255, 180, 0, 0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div id="app">
  <canvas id="gameCanvas" width="900" height="600"></canvas>

  <!-- MENU -->
  <div id="screen-menu" class="screen">
    <div class="eb-eyebrow">ErvinBuilds</div>
    <div class="main-title">PONG</div>
    <div class="tagline">Single Player &nbsp;·&nbsp; vs AI</div>
    <div class="section-label">Select Difficulty</div>
    <div class="diff-row">
      <button class="btn-diff" id="btn-easy"   onclick="selectDiff('easy')">Easy</button>
      <button class="btn-diff selected" id="btn-medium" onclick="selectDiff('medium')">Medium</button>
      <button class="btn-diff" id="btn-hard"   onclick="selectDiff('hard')">Hard</button>
    </div>
    <button class="btn-primary" onclick="showControls()">Play</button>
    <div class="hint">First to 10 wins</div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-gameover" class="screen hidden">
    <div class="eb-eyebrow">ErvinBuilds</div>
    <div class="result-title red">GAME OVER</div>
    <div class="divider"></div>
    <div class="result-score" id="go-score">YOU 0 — AI 10</div>
    <div class="action-row">
      <button class="btn-primary"   onclick="tryAgain()">Try Again</button>
      <button class="btn-secondary" onclick="goToMenu()">Change Difficulty</button>
    </div>
  </div>

  <!-- VICTORY -->
  <div id="screen-victory" class="screen hidden">
    <div class="eb-eyebrow">ErvinBuilds</div>
    <div class="result-title">VICTORY</div>
    <div class="divider"></div>
    <div class="result-score" id="vc-score">YOU 10 — AI 0</div>
    <div class="action-row">
      <button class="btn-primary"   onclick="tryAgain()">Try Again</button>
      <button class="btn-secondary" onclick="goToMenu()">Change Difficulty</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="screen-controls" class="screen hidden">
    <div class="eb-eyebrow">ErvinBuilds</div>
    <div class="controls-title">HOW TO PLAY</div>
    <div class="divider"></div>
    <div class="controls-list">
      <div class="controls-row">
        <span class="key-badge">W</span>
        <span class="key-action">Move Up</span>
      </div>
      <div class="controls-row">
        <span class="key-badge">S</span>
        <span class="key-action">Move Down</span>
      </div>
      <div class="controls-row">
        <span class="key-badge">P</span>
        <span class="key-sep">/</span>
        <span class="key-badge">ESC</span>
        <span class="key-action">Pause</span>
      </div>
    </div>
    <div class="divider" style="margin-top: 38px; margin-bottom: 32px;"></div>
    <button class="btn-primary" onclick="proceedToGame()">Got it — Let's Play</button>
  </div>

  <!-- PAUSE -->
  <div id="screen-pause" class="screen hidden">
    <div class="eb-eyebrow">ErvinBuilds</div>
    <div class="pause-title">PAUSED</div>
    <div class="divider"></div>
    <div class="pause-menu">
      <button class="btn-primary"   onclick="resumeGame()">Resume</button>
      <button class="btn-secondary" onclick="restartFromPause()">Restart</button>
      <button class="btn-secondary" onclick="goToMenu()">Change Difficulty</button>
    </div>
    <div class="hint">P or ESC to resume</div>
  </div>

  <div id="watermark">ErvinBuilds</div>
  <button id="btn-pause" onclick="pauseGame()" title="Pause (P / Esc)">II</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 600;

const GOLD        = '#FFD700';
const GOLD_ACCENT = '#FFA500';
const PADDLE_W    = 12;
const PADDLE_H    = 90;
const BALL_R      = 8;
const PAD_MARGIN  = 46;
const INIT_SPEED  = 5.2;
const SPEED_INC   = 0.28;
const MAX_SPEED   = 13;
const WIN_SCORE   = 10;
const RESET_MS    = 1050;

const DIFF = {
  easy:   { speed: 2.6,  errorMag: 48, predict: 0.12 },
  medium: { speed: 4.2,  errorMag: 22, predict: 0.62 },
  hard:   { speed: 7.0,  errorMag:  6, predict: 0.92 },
};

let selDiff     = 'medium';
let gameRunning = false;
let gamePaused  = false;
let gameEnding  = false;
let animId      = null;
let prevTs      = 0;
let currentTs   = 0;

let player, ai, ball;
let playerScore, aiScore;
let ballActive, resetTimer, lastScorer;
let aiError = 0, aiErrorSet = false;
let keys = {};

let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, vol = 0.12, type = 'square', when = 0) {
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    const t = ac.currentTime + when;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.start(t); osc.stop(t + dur + 0.01);
  } catch (_) {}
}
function sfxPaddle() { beep(460, 0.07, 0.13, 'square'); }
function sfxWall()   { beep(300, 0.06, 0.08, 'square'); }
function sfxScore()  { beep(220, 0.18, 0.14, 'sine'); beep(175, 0.22, 0.10, 'sine', 0.17); }
function sfxWin()    { [523,659,784,1047].forEach((f,i) => beep(f, 0.18, 0.14, 'sine', i*0.13)); }
function sfxLose()   { [330,294,262,220].forEach((f,i) => beep(f, 0.22, 0.14, 'sine', i*0.14)); }

function showScreen(id) {
  ['screen-menu','screen-gameover','screen-victory','screen-pause','screen-controls']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  if (id) document.getElementById(id).classList.remove('hidden');
}
function setPauseButtonVisible(show) {
  document.getElementById('btn-pause').style.display = show ? 'flex' : 'none';
}
function selectDiff(d) {
  selDiff = d;
  ['easy','medium','hard'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('selected', x === d);
  });
}

function fitApp() {
  const app = document.getElementById('app');
  const s = Math.min(window.innerWidth/900, window.innerHeight/600);
  app.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitApp);
fitApp();

function initGame() {
  player = { x: PAD_MARGIN, y: H/2 - PADDLE_H/2 };
  ai     = { x: W - PAD_MARGIN - PADDLE_W, y: H/2 - PADDLE_H/2 };
  playerScore = 0; aiScore = 0;
  gameEnding = false; aiError = 0; aiErrorSet = false;
  spawnBall(Math.random() < 0.5 ? 1 : -1);
}

function spawnBall(xDir) {
  const angle = (Math.random()*40-20)*(Math.PI/180);
  const sp = INIT_SPEED;
  ball = { x:W/2, y:H/2+(Math.random()*60-30), vx:Math.cos(angle)*sp*xDir, vy:Math.sin(angle)*sp, speed:sp };
  if (Math.abs(ball.vy) < 0.8) ball.vy = 0.8*(Math.random()<0.5?1:-1);
  ballActive = true; aiErrorSet = false;
}

function predictBallY(targetX) {
  if (ball.vx <= 0) return H/2;
  const t = (targetX - ball.x) / ball.vx;
  let py = ball.y + ball.vy * t;
  py = ((py % (2*H)) + 2*H) % (2*H);
  if (py > H) py = 2*H - py;
  return Math.max(0, Math.min(H, py));
}

function updatePlayer(dt) {
  const spd = 6.2;
  if (keys['w']||keys['W']) player.y -= spd*dt*60;
  if (keys['s']||keys['S']) player.y += spd*dt*60;
  player.y = Math.max(0, Math.min(H-PADDLE_H, player.y));
}

function updateAI(dt) {
  const cfg = DIFF[selDiff];
  let targetY;
  if (ball.vx > 0 && ballActive) {
    if (!aiErrorSet) { aiError = (Math.random()*2-1)*cfg.errorMag; aiErrorSet = true; }
    const predicted = predictBallY(ai.x + PADDLE_W/2);
    const blended = ball.y*(1-cfg.predict) + predicted*cfg.predict;
    targetY = blended + aiError - PADDLE_H/2;
  } else {
    aiErrorSet = false;
    targetY = H/2 - PADDLE_H/2;
  }
  targetY = Math.max(0, Math.min(H-PADDLE_H, targetY));
  const diff = targetY - ai.y;
  const maxStep = cfg.speed*(dt*60);
  ai.y += Math.sign(diff)*Math.min(Math.abs(diff), maxStep);
  ai.y = Math.max(0, Math.min(H-PADDLE_H, ai.y));
}

function updateBall(dt) {
  if (gameEnding) return;
  if (!ballActive) {
    resetTimer -= dt*1000;
    if (resetTimer <= 0) spawnBall(lastScorer==='player' ? 1 : -1);
    return;
  }
  const SUBSTEPS = 2;
  const subDt = dt/SUBSTEPS;
  let scored = false;
  for (let s = 0; s < SUBSTEPS && !scored; s++) {
    ball.x += ball.vx*subDt*60;
    ball.y += ball.vy*subDt*60;
    if (ball.y-BALL_R<=0)  { ball.y=BALL_R;      ball.vy= Math.abs(ball.vy); sfxWall(); }
    if (ball.y+BALL_R>=H)  { ball.y=H-BALL_R;    ball.vy=-Math.abs(ball.vy); sfxWall(); }
    if (ball.vx<0 && ball.x-BALL_R<=player.x+PADDLE_W && ball.x+BALL_R>=player.x && ball.y+BALL_R>=player.y-2 && ball.y-BALL_R<=player.y+PADDLE_H+2) {
      ball.x = player.x+PADDLE_W+BALL_R+1;
      const rel = (ball.y-(player.y+PADDLE_H/2))/(PADDLE_H/2);
      const angle = Math.max(-0.98,Math.min(0.98,rel))*(65*Math.PI/180);
      ball.speed = Math.min(ball.speed+SPEED_INC, MAX_SPEED);
      ball.vx = Math.abs(Math.cos(angle)*ball.speed);
      ball.vy = Math.sin(angle)*ball.speed;
      if (Math.abs(ball.vy)<0.5) ball.vy=0.5*Math.sign(ball.vy||1);
      aiErrorSet = false; sfxPaddle();
    }
    if (ball.vx>0 && ball.x+BALL_R>=ai.x && ball.x-BALL_R<=ai.x+PADDLE_W && ball.y+BALL_R>=ai.y-2 && ball.y-BALL_R<=ai.y+PADDLE_H+2) {
      ball.x = ai.x-BALL_R-1;
      const rel = (ball.y-(ai.y+PADDLE_H/2))/(PADDLE_H/2);
      const angle = Math.max(-0.98,Math.min(0.98,rel))*(65*Math.PI/180);
      ball.speed = Math.min(ball.speed+SPEED_INC, MAX_SPEED);
      ball.vx = -Math.abs(Math.cos(angle)*ball.speed);
      ball.vy = Math.sin(angle)*ball.speed;
      if (Math.abs(ball.vy)<0.5) ball.vy=0.5*Math.sign(ball.vy||1);
      sfxPaddle();
    }
    if (ball.x-BALL_R>W) {
      playerScore++; sfxScore(); ballActive=false; lastScorer='player'; resetTimer=RESET_MS;
      ball.x=W/2; ball.y=H/2; scored=true; checkWin();
    } else if (ball.x+BALL_R<0) {
      aiScore++; sfxScore(); ballActive=false; lastScorer='ai'; resetTimer=RESET_MS;
      ball.x=W/2; ball.y=H/2; scored=true; checkWin();
    }
  }
}

function checkWin() {
  if (gameEnding) return;
  if (playerScore>=WIN_SCORE || aiScore>=WIN_SCORE) {
    gameEnding = true;
    const won = playerScore>=WIN_SCORE;
    setTimeout(() => {
      gameRunning = false;
      if (won) {
        sfxWin();
        document.getElementById('vc-score').textContent = `YOU ${playerScore}  —  AI ${aiScore}`;
        showScreen('screen-victory');
      } else {
        sfxLose();
        document.getElementById('go-score').textContent = `YOU ${playerScore}  —  AI ${aiScore}`;
        showScreen('screen-gameover');
      }
    }, 480);
  }
}

function drawRoundedRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawPaddle(x,y) {
  ctx.save();
  // Outer glow layer
  ctx.shadowColor = GOLD_ACCENT;
  ctx.shadowBlur  = 28;
  drawRoundedRect(x,y,PADDLE_W,PADDLE_H,5);
  ctx.fillStyle = 'rgba(255,165,0,0.15)';
  ctx.fill();
  // Inner bright gradient
  ctx.shadowColor = GOLD;
  ctx.shadowBlur  = 14;
  drawRoundedRect(x,y,PADDLE_W,PADDLE_H,5);
  const grad = ctx.createLinearGradient(x,y,x+PADDLE_W,y+PADDLE_H);
  grad.addColorStop(0,   '#FFE86A');
  grad.addColorStop(0.4, '#FFD700');
  grad.addColorStop(1,   '#C88800');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawBall(x,y) {
  // Pulse glow using currentTs
  const pulse = 0.7 + 0.3 * Math.sin(currentTs * 0.006);
  ctx.save();
  // Wide outer glow
  ctx.shadowColor = GOLD_ACCENT;
  ctx.shadowBlur  = 40 * pulse;
  ctx.fillStyle   = 'rgba(255,165,0,0.2)';
  ctx.beginPath();
  ctx.arc(x, y, BALL_R * 2.2, 0, Math.PI*2);
  ctx.fill();
  // Core glow
  ctx.shadowColor = GOLD;
  ctx.shadowBlur  = 22 * pulse;
  ctx.fillStyle   = GOLD;
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Specular
  ctx.fillStyle = 'rgba(255,255,220,0.6)';
  ctx.beginPath();
  ctx.arc(x-2.5, y-2.5, BALL_R*0.36, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#090909';
  ctx.fillRect(0,0,W,H);
  const vign = ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle = vign;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.setLineDash([7,15]);
  ctx.strokeStyle = 'rgba(255,165,0,0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.restore();

  // Scores with glow
  ctx.save();
  ctx.textAlign  = 'center';
  ctx.fillStyle  = GOLD;
  ctx.shadowColor = GOLD;
  ctx.shadowBlur  = 24;
  ctx.font = 'bold 58px "Courier New"';
  ctx.fillText(String(playerScore), W/2-92, 74);
  ctx.fillText(String(aiScore),     W/2+92, 74);
  ctx.shadowBlur = 0;
  ctx.font = '9px "Courier New"';
  ctx.fillStyle = 'rgba(255,165,0,0.35)';
  ctx.fillText('YOU', W/2-92, 90);
  ctx.fillText('AI',  W/2+92, 90);
  ctx.restore();

  drawPaddle(player.x, player.y);
  drawPaddle(ai.x,     ai.y);
  drawBall(ball.x, ball.y);

  ctx.save();
  ctx.textAlign = 'right';
  ctx.font = '9px "Courier New"';
  ctx.fillStyle = 'rgba(255,165,0,0.15)';
  ctx.fillText(selDiff.toUpperCase(), W-18, H-16);
  ctx.restore();
}

function drawStatic() {
  ctx.fillStyle = '#090909';
  ctx.fillRect(0,0,W,H);
  const vign = ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle = vign;
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.setLineDash([7,15]);
  ctx.strokeStyle='rgba(255,165,0,0.08)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.restore();
  drawPaddle(PAD_MARGIN, H/2-PADDLE_H/2);
  drawPaddle(W-PAD_MARGIN-PADDLE_W, H/2-PADDLE_H/2);
  // Static ball (no pulse)
  ctx.save();
  ctx.shadowColor = GOLD; ctx.shadowBlur = 22;
  ctx.fillStyle = GOLD;
  ctx.beginPath(); ctx.arc(W/2, H/2, BALL_R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,220,0.6)';
  ctx.beginPath(); ctx.arc(W/2-2.5, H/2-2.5, BALL_R*0.36, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function loop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts-prevTs)/1000, 0.05);
  prevTs = ts; currentTs = ts;
  updatePlayer(dt); updateAI(dt); updateBall(dt); draw();
  animId = requestAnimationFrame(loop);
}

function showControls() {
  if (animId) cancelAnimationFrame(animId);
  gameRunning=false; gamePaused=false;
  setPauseButtonVisible(false);
  showScreen('screen-controls');
}
function proceedToGame() {
  if (animId) cancelAnimationFrame(animId);
  showScreen(null);
  setPauseButtonVisible(true);
  initGame();
  gameRunning=true; gamePaused=false;
  prevTs=performance.now();
  animId=requestAnimationFrame(loop);
}
function tryAgain() { proceedToGame(); }
function pauseGame() {
  if (!gameRunning||gameEnding||gamePaused) return;
  gamePaused=true;
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  setPauseButtonVisible(false);
  document.getElementById('screen-pause').classList.remove('hidden');
}
function resumeGame() {
  if (!gamePaused) return;
  gamePaused=false;
  document.getElementById('screen-pause').classList.add('hidden');
  setPauseButtonVisible(true);
  prevTs=performance.now();
  animId=requestAnimationFrame(loop);
}
function restartFromPause() { gamePaused=false; proceedToGame(); }
function goToMenu() {
  if (animId) cancelAnimationFrame(animId);
  gameRunning=false; gamePaused=false;
  setPauseButtonVisible(false);
  showScreen('screen-menu');
  drawStatic();
}

document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if (['w','W','s','S','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if (e.key==='p'||e.key==='P'||e.key==='Escape') {
    e.preventDefault();
    if (gameRunning&&!gameEnding) { if (gamePaused) resumeGame(); else pauseGame(); }
  }
});
document.addEventListener('keyup', e => { keys[e.key]=false; });

drawStatic();
</script>
</body>
